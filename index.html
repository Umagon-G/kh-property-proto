<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>KH Property — 指でなぞって囲って探す（proto v0.4）</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<style>
  :root{--navy:#0B2138;--teal:#0E7C86;--amber:#F4A300;--ink:#1E293B;--mute:#64748B;
        --line:#E2E8F0;--panel:#F1F5F9;--ok:#0E9F6E;--bad:#C0263A;--white:#fff;}
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif;color:var(--ink)}
  #app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}
  header{background:var(--navy);color:#fff;padding:10px 14px;flex:0 0 auto;z-index:1200}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px}
  .brand .dot{width:10px;height:18px;background:var(--amber);border-radius:2px}
  .brand small{font-weight:500;color:#9FB3C8;font-size:11px;margin-left:6px}
  .seg{display:flex;margin-top:9px;background:#12304a;border-radius:10px;padding:3px;width:max-content}
  .seg button{border:none;background:transparent;color:#cfe0ee;font-weight:800;font-size:13px;padding:7px 14px;border-radius:8px;cursor:pointer}
  .seg button.on{background:var(--amber);color:#1a1a1a}
  .toolrow{display:flex;gap:8px;margin-top:9px;align-items:center}
  .tbtn{border:1px solid #2b4258;background:#12304a;color:#cfe0ee;border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:700;cursor:pointer}
  .tbtn .n{color:var(--amber)}
  #mapwrap{position:relative;flex:1 1 auto;min-height:0}
  #map{position:absolute;inset:0}
  .fab{position:absolute;z-index:1100;border:none;border-radius:999px;font-weight:800;box-shadow:0 6px 18px rgba(11,33,56,.3);cursor:pointer}
  #fhBtn{left:50%;transform:translateX(-50%);bottom:14px;background:var(--teal);color:#fff;padding:14px 22px;font-size:15px}
  #fhBtn.on{background:var(--amber);color:#1a1a1a}
  #demoBtn{right:12px;bottom:14px;background:#fff;color:var(--navy);border:1px solid var(--line)!important;padding:11px 14px;font-size:13px}
  #clearBtn{left:12px;bottom:14px;background:#fff;color:var(--bad);border:1px solid var(--line)!important;padding:11px 14px;font-size:13px;display:none}
  .tip{position:absolute;z-index:1100;left:50%;transform:translateX(-50%);top:12px;background:rgba(11,33,56,.92);color:#fff;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700;display:none}
  .legend{position:absolute;z-index:1100;top:12px;right:12px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 10px;box-shadow:0 4px 12px rgba(11,33,56,.15)}
  .legend div{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:11.5px;font-weight:700;color:var(--ink)}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
  /* cluster bubble: unified navy, number + district name */
  .cl{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;color:#fff;border:3px solid rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(11,33,56,.35);line-height:1}
  .cl .cn{font-weight:800;font-size:18px} .cl .cd{font-size:9px;opacity:.92;margin-top:2px;max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #sheet{flex:0 0 auto;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 24px rgba(11,33,56,.1);max-height:46dvh;display:flex;flex-direction:column}
  .sheet-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);gap:8px}
  .sheet-h b{font-size:15px} .sheet-h .cnt{color:var(--teal);font-weight:800}
  .sheet-h select{border:1px solid var(--line);border-radius:8px;padding:6px 8px;font-size:12.5px;font-weight:700;color:var(--ink);background:#fff}
  .list{overflow:auto;padding:10px 12px;display:grid;grid-template-columns:1fr;gap:10px}
  .card{display:grid;grid-template-columns:84px 1fr;gap:11px;border:1px solid var(--line);border-radius:12px;padding:10px;cursor:pointer;background:#fff}
  .thumb{width:84px;height:84px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px;text-align:center;line-height:1.2}
  .ttl{font-weight:800;font-size:14px;margin:0 0 3px} .addr{color:var(--mute);font-size:11.5px;margin:0 0 5px}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
  .b{font-size:10.5px;font-weight:800;border-radius:6px;padding:2px 7px}
  .b.biz{background:#e7eefc;color:#1d4ed8} .b.res{background:#eafaf1;color:#0e9f6e} .b.sale{background:#fdeccf;color:#9a6700} .b.ver{background:#fff4d6;color:#9a6700} .b.ver::before{content:"✓ "}
  .price{font-weight:900;font-size:18px;color:var(--navy)} .price small{font-size:11px;color:var(--mute);font-weight:700}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;margin-top:5px}
  .kv{font-size:11.5px;display:flex;justify-content:space-between;border-bottom:1px dotted #e7ecf2;padding:1px 0}
  .kv span:first-child{color:var(--mute)} .kv b{font-weight:800} .yes{color:var(--ok)} .no{color:var(--bad)}
  .empty{color:var(--mute);text-align:center;padding:26px 10px;font-size:13px}
  .note{font-size:10.5px;color:var(--mute);padding:6px 14px;background:var(--panel)}
  #scrim{position:fixed;inset:0;background:rgba(11,33,56,.45);z-index:1300;display:none}
  #filter{position:fixed;z-index:1400;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;padding:16px 18px 20px;box-shadow:0 -10px 30px rgba(11,33,56,.25);transform:translateY(100%);transition:transform .22s;max-height:80dvh;overflow:auto}
  #filter.open{transform:translateY(0)} #scrim.open{display:block}
  #filter h3{margin:2px 0 12px;font-size:17px}
  .frow{margin-bottom:15px} .frow label{font-size:13px;font-weight:800;display:block;margin-bottom:7px}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}
  .opt.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .rng{display:flex;align-items:center;gap:10px} .rng input[type=range]{flex:1}
  .rngval{font-weight:800;color:var(--teal);min-width:88px;text-align:right;font-size:14px}
  .applybar{display:flex;gap:10px;margin-top:6px}
  .applybar .clr{background:#fff;border:1px solid var(--line);color:var(--mute);border-radius:10px;padding:13px 16px;font-weight:800;cursor:pointer}
  .applybar .ap{flex:1;background:var(--teal);border:none;color:#fff;border-radius:10px;padding:13px;font-weight:800;font-size:15px;cursor:pointer}
  @media(min-width:880px){#app{flex-direction:row}#left{flex:0 0 440px;display:flex;flex-direction:column;border-right:1px solid var(--line);height:100dvh}header{order:0}#sheet{order:1;flex:1 1 auto;max-height:none;border-top:none}#mapwrap{order:2;flex:1 1 auto}#filter{left:auto;width:440px;border-radius:0}}
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <header>
      <div class="brand"><span class="dot"></span>KH Property <small>指でなぞって囲って探す・全条件が最初から出る（proto v0.4）</small></div>
      <div class="seg" id="seg"><button data-u="all" class="on">すべて</button><button data-u="biz">事業用</button><button data-u="res">住居</button><button data-u="sale">売買</button></div>
      <div class="toolrow"><button class="tbtn" id="openFilter">⚙ 絞り込み <span class="n" id="fcnt"></span></button><button class="tbtn" id="resetAll">条件クリア</button></div>
    </header>
    <div id="sheet">
      <div class="sheet-h">
        <div><b>物件</b> <span class="cnt" id="cnt">0</span> 件</div>
        <select id="sort"><option value="rec">おすすめ順</option><option value="pa">価格が安い順</option><option value="pd">価格が高い順</option><option value="ad">面積が広い順</option></select>
      </div>
      <div class="list" id="list"></div>
      <div class="note">※ proto v0.4：物件=ランダム約100件のサンプル。地図=OpenStreetMap（後でGoogleマップ可）。円＝行政区域ごとの物件数（数字＝件数）。</div>
    </div>
  </div>
  <div id="mapwrap">
    <div id="map"></div>
    <div class="legend"><div><i style="background:#0E7C86"></i>事業用（賃貸）</div><div><i style="background:#1d4ed8"></i>住居（賃貸）</div><div><i style="background:#F4A300"></i>売買</div></div>
    <div class="tip" id="tip">指でなぞって輪を描いてください ✍</div>
    <button class="fab" id="fhBtn">✍ 指でなぞって囲む</button>
    <button class="fab" id="demoBtn">デモエリア</button>
    <button class="fab" id="clearBtn">✕ エリア解除</button>
  </div>
</div>
<div id="scrim"></div>
<div id="filter">
  <h3>絞り込み条件</h3>
  <div class="frow"><label>用途・取引</label><div class="opts" id="fUse"><div class="opt on" data-u="all">すべて</div><div class="opt" data-u="biz">事業用(賃貸)</div><div class="opt" data-u="res">住居(賃貸)</div><div class="opt" data-u="sale">売買</div></div></div>
  <div class="frow"><label>価格の上限（USD：賃貸=月/売買=総額）</label><div class="rng"><input type="range" id="fPrice" min="0" max="100" step="1" value="100"><span class="rngval" id="fPriceV">上限なし</span></div></div>
  <div class="frow"><label>専有面積の最低（㎡）</label><div class="rng"><input type="range" id="fArea" min="0" max="400" step="10" value="0"><span class="rngval" id="fAreaV">指定なし</span></div></div>
  <div class="frow"><label>デポジット上限（賃貸）</label><div class="opts" id="fDep"><div class="opt on" data-d="9">指定なし</div><div class="opt" data-d="1">1ヶ月</div><div class="opt" data-d="2">2ヶ月以下</div><div class="opt" data-d="3">3ヶ月以下</div></div></div>
  <div class="frow"><label>こだわり条件</label><div class="opts" id="fFlags"><div class="opt" data-k="ver">✓ 検証済み</div><div class="opt" data-k="tax">税インボイス可</div><div class="opt" data-k="meter">専用メーター</div><div class="opt" data-k="fixed">賃料固定</div></div></div>
  <div class="applybar"><button class="clr" id="fClear">クリア</button><button class="ap" id="fApply">この条件で見る（<span id="fApplyCnt">0</span>件）</button></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script>
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry32(20260618);
const rb=(a,b)=>a+rnd()*(b-a), ri=(a,b)=>Math.floor(rb(a,b+0.999)), pick=a=>a[Math.floor(rnd()*a.length)];
const DISTRICTS=[
 {name:"BKK1",lat:11.5490,lng:104.9220,n:18,biz:.5},{name:"Chamkarmon",lat:11.5420,lng:104.9180,n:16,biz:.5},
 {name:"Toul Tom Poung",lat:11.5380,lng:104.9150,n:14,biz:.4},{name:"Tonle Bassac",lat:11.5540,lng:104.9290,n:12,biz:.35},
 {name:"Daun Penh",lat:11.5710,lng:104.9230,n:12,biz:.55},{name:"Toul Kork",lat:11.5720,lng:104.9000,n:10,biz:.3},
 {name:"BKK3",lat:11.5450,lng:104.9170,n:8,biz:.4},{name:"Sen Sok",lat:11.5980,lng:104.8850,n:8,biz:.4},
 {name:"Mean Chey",lat:11.5170,lng:104.9230,n:6,biz:.6},
];
const BIZUSE=["オフィス","店舗","倉庫","倉庫付事業","飲食区画","医療区画"], RESUSE=["アパート","コンド","ヴィラ","スタジオ","一軒家"];
let P=[],id=0;
DISTRICTS.forEach(d=>{for(let i=0;i<d.n;i++){id++;
  const biz=rnd()<d.biz, use=biz?pick(BIZUSE):pick(RESUSE), m2=biz?ri(60,400):ri(28,260), sale=rnd()<0.15;
  let price=biz?Math.round((400+m2*rb(4,9))/50)*50:Math.round((180+m2*rb(3,7))/10)*10; price=Math.max(200,Math.min(2600,price));
  const saleP=Math.round(m2*rb(900,2600)/1000)*1000;
  const dep=biz?pick([2,2,3,3]):pick([1,1,2]), fixed=biz?(rnd()<.6?1:0):0;
  const term=fixed?pick(["2年・固定","3年・固定","5年・固定"]):(biz?pick(["2年","3年"]):"1年");
  P.push({id,t:use+" "+m2+"㎡",dist:d.name,area:d.name+" / St."+ri(10,600),lat:d.lat+rb(-.012,.012),lng:d.lng+rb(-.014,.014),
    type:biz?"biz":"res",deal:sale?"sale":"rent",cat:sale?"sale":(biz?"biz":"res"),use,price,saleP,dep,term,fixed,
    meter:rnd()<(biz?.8:.55)?1:0,tax:biz?(rnd()<.7?1:0):(rnd()<.15?1:0),m2,ver:rnd()<(biz?.45:.3)?1:0});
}});
const COL={biz:"#0E7C86",res:"#1d4ed8",sale:"#F4A300"};
const F={use:"all",priceMax:1e9,areaMin:0,depMax:9,ver:0,tax:0,meter:0,fixed:0};
let area=null,sortKey="rec";
const map=L.map('map',{zoomControl:true}).setView([11.5520,104.9150],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const drawn=new L.FeatureGroup().addTo(map);
const cluster=L.markerClusterGroup({showCoverageOnHover:false,maxClusterRadius:55,
  iconCreateFunction:c=>{const ms=c.getAllChildMarkers();const n=ms.length;const t={};
    ms.forEach(m=>{const k=m.p?m.p.dist:"";t[k]=(t[k]||0)+1;});let dist="",mx=0;for(const k in t){if(t[k]>mx){mx=t[k];dist=k;}}
    const s=n<8?54:n<20?66:76;
    return L.divIcon({html:'<div class="cl" style="width:'+s+'px;height:'+s+'px;background:#0B2138"><span class="cn">'+n+'</span><span class="cd">'+dist+'</span></div>',className:'',iconSize:[s,s]});}
}).addTo(map);
const val=p=>p.deal==='sale'?p.saleP:p.price;
function passFilter(p){
  if(F.use==="biz"&&!(p.deal==="rent"&&p.type==="biz"))return false;
  if(F.use==="res"&&!(p.deal==="rent"&&p.type==="res"))return false;
  if(F.use==="sale"&&p.deal!=="sale")return false;
  if(val(p)>F.priceMax)return false;
  if(p.m2<F.areaMin)return false;
  if(p.deal==="rent"&&p.dep>F.depMax)return false;
  if(F.ver&&!p.ver)return false;if(F.tax&&!p.tax)return false;if(F.meter&&!p.meter)return false;if(F.fixed&&!p.fixed)return false;
  return true;
}
function inArea(p){return area?turf.booleanPointInPolygon(turf.point([p.lng,p.lat]),area):true;}
function sortVis(a){const k=sortKey;return a.sort((x,y)=>k==="pa"?val(x)-val(y):k==="pd"?val(y)-val(x):k==="ad"?y.m2-x.m2:((y.ver-x.ver)||(val(x)-val(y))));}
function activeFlags(){return ["ver","tax","meter","fixed"].filter(k=>F[k]).length+(F.priceMax<1e9?1:0)+(F.areaMin>0?1:0)+(F.depMax<9?1:0);}
function countF(){return P.filter(passFilter).length;}
function priceHTML(p){return p.deal==='sale'?('<div class="price">$'+p.saleP.toLocaleString()+'<small> 売買・総額</small></div>'):('<div class="price">$'+p.price+'<small> /月（最終・税別）</small></div>');}
function render(){
  let vis=P.filter(p=>passFilter(p)&&inArea(p)); sortVis(vis);
  document.getElementById('cnt').textContent=vis.length;
  const fc=activeFlags();document.getElementById('fcnt').textContent=fc?("("+fc+")"):"";
  cluster.clearLayers();
  vis.forEach(p=>{const m=L.circleMarker([p.lat,p.lng],{radius:7,weight:2,color:'#fff',fillColor:COL[p.cat],fillOpacity:.95});m.p=p;
    m.bindTooltip(p.t+" / "+(p.deal==='sale'?('$'+p.saleP.toLocaleString()+' 売買'):('$'+p.price+'/月')));
    m.on('click',()=>{const el=document.getElementById('c'+p.id);if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='2px solid var(--amber)';setTimeout(()=>el.style.outline='',1200);}});cluster.addLayer(m);});
  const L2=document.getElementById('list');
  if(!vis.length){L2.innerHTML='<div class="empty">条件に合う物件がありません。<br>条件やエリアを調整してください。</div>';return;}
  L2.innerHTML=vis.map(p=>`<div class="card" id="c${p.id}" onclick="focusP(${p.lat},${p.lng})">
     <div class="thumb" style="background:${COL[p.cat]}">${p.use}</div>
     <div><div class="badges">${p.deal==='sale'?'<span class="b sale">売買</span>':`<span class="b ${p.type}">${p.type==='biz'?'事業用':'住居'}</span>`}${p.ver?'<span class="b ver">検証済み</span>':''}</div>
       <p class="ttl">${p.t}</p><p class="addr">${p.area} ・ ${p.m2}㎡</p>
       ${priceHTML(p)}
       <div class="grid"><div class="kv"><span>${p.deal==='sale'?'㎡単価':'デポジット'}</span><b>${p.deal==='sale'?('$'+Math.round(p.saleP/p.m2)):(p.dep+'ヶ月')}</b></div><div class="kv"><span>${p.deal==='sale'?'取引':'契約'}</span><b>${p.deal==='sale'?'売買':p.term}</b></div>
       <div class="kv"><span>メーター</span><b class="${p.meter?'yes':'no'}">${p.meter?'専用':'共用'}</b></div><div class="kv"><span>税ｲﾝﾎﾞｲｽ</span><b class="${p.tax?'yes':'no'}">${p.tax?'発行可':'不可'}</b></div></div>
     </div></div>`).join('');
}
function focusP(lat,lng){map.setView([lat,lng],16,{animate:true});}window.focusP=focusP;
document.getElementById('sort').onchange=e=>{sortKey=e.target.value;render();document.getElementById('list').scrollTop=0;};
document.getElementById('seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#seg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');F.use=b.dataset.u;document.querySelectorAll('#fUse .opt').forEach(o=>o.classList.toggle('on',o.dataset.u===F.use));render();});

let fh=false,pts=[],line=null;const el=map.getContainer();
function setFH(on){fh=on;const b=document.getElementById('fhBtn');b.classList.toggle('on',on);b.textContent=on?"✍ なぞって描く（ドラッグ）":"✍ 指でなぞって囲む";document.getElementById('tip').style.display=on?'block':'none';if(on){map.dragging.disable();map.doubleClickZoom.disable();el.style.cursor='crosshair';el.style.touchAction='none';}else{map.dragging.enable();map.doubleClickZoom.enable();el.style.cursor='';el.style.touchAction='';}}
function ll(e){const r=el.getBoundingClientRect();return map.containerPointToLatLng([e.clientX-r.left,e.clientY-r.top]);}
el.addEventListener('pointerdown',e=>{if(!fh)return;e.preventDefault();pts=[ll(e)];if(line){drawn.removeLayer(line);line=null;}try{el.setPointerCapture(e.pointerId);}catch(_){}},{passive:false});
el.addEventListener('pointermove',e=>{if(!fh||!pts.length)return;e.preventDefault();pts.push(ll(e));if(line)drawn.removeLayer(line);line=L.polyline(pts,{color:'#F4A300',weight:4}).addTo(drawn);},{passive:false});
el.addEventListener('pointerup',e=>{if(!fh||!pts.length)return;finishFH();},{passive:false});
function finishFH(){if(pts.length<3){pts=[];setFH(false);return;}drawn.clearLayers();L.polygon(pts,{color:'#F4A300',weight:3,fillOpacity:.08}).addTo(drawn);const c=pts.map(p=>[p.lng,p.lat]);c.push(c[0]);area=turf.polygon([c]);pts=[];setFH(false);document.getElementById('clearBtn').style.display='block';render();}
window.__demoDraw=function(){const cp=map.latLngToContainerPoint([11.5460,104.9190]);const r=140,n=26,lls=[];for(let i=0;i<=n;i++){const a=i/n*2*Math.PI;lls.push(map.containerPointToLatLng([cp.x+r*Math.cos(a),cp.y+r*Math.sin(a)*0.85]));}drawn.clearLayers();L.polygon(lls,{color:'#F4A300',weight:3,fillOpacity:.08}).addTo(drawn);const c=lls.map(p=>[p.lng,p.lat]);c.push(c[0]);area=turf.polygon([c]);document.getElementById('clearBtn').style.display='block';render();};
document.getElementById('fhBtn').onclick=()=>setFH(!fh);
document.getElementById('demoBtn').onclick=()=>window.__demoDraw();
document.getElementById('clearBtn').onclick=()=>{drawn.clearLayers();area=null;document.getElementById('clearBtn').style.display='none';render();};

const scrim=document.getElementById('scrim'),fd=document.getElementById('filter');
function openF(){updateApplyCnt();fd.classList.add('open');scrim.classList.add('open');}function closeF(){fd.classList.remove('open');scrim.classList.remove('open');}
document.getElementById('openFilter').onclick=openF;scrim.onclick=closeF;
document.getElementById('fUse').addEventListener('click',e=>{const o=e.target.closest('.opt');if(!o)return;document.querySelectorAll('#fUse .opt').forEach(x=>x.classList.remove('on'));o.classList.add('on');F.use=o.dataset.u;document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('on',b.dataset.u===F.use));updateApplyCnt();});
document.getElementById('fDep').addEventListener('click',e=>{const o=e.target.closest('.opt');if(!o)return;document.querySelectorAll('#fDep .opt').forEach(x=>x.classList.remove('on'));o.classList.add('on');F.depMax=+o.dataset.d;updateApplyCnt();});
document.getElementById('fFlags').addEventListener('click',e=>{const o=e.target.closest('.opt');if(!o)return;o.classList.toggle('on');F[o.dataset.k]=o.classList.contains('on')?1:0;updateApplyCnt();});
const fp=document.getElementById('fPrice');fp.oninput=()=>{const v=+fp.value;F.priceMax=v>=100?1e9:(v<=26?v*100:(2600+(v-26)*( (520000-2600)/(100-26) )));document.getElementById('fPriceV').textContent=v>=100?"上限なし":(F.priceMax<3000?("月$"+Math.round(F.priceMax)):("総額$"+Math.round(F.priceMax/1000)+"k"));updateApplyCnt();};
const fa=document.getElementById('fArea');fa.oninput=()=>{F.areaMin=+fa.value;document.getElementById('fAreaV').textContent=(+fa.value===0)?"指定なし":(fa.value+"㎡〜");updateApplyCnt();};
function updateApplyCnt(){document.getElementById('fApplyCnt').textContent=countF();}
document.getElementById('fApply').onclick=()=>{closeF();render();};
document.getElementById('fClear').onclick=()=>resetAll();document.getElementById('resetAll').onclick=()=>resetAll();
function resetAll(){F.use="all";F.priceMax=1e9;F.areaMin=0;F.depMax=9;F.ver=F.tax=F.meter=F.fixed=0;document.querySelectorAll('#fUse .opt').forEach(o=>o.classList.toggle('on',o.dataset.u==="all"));document.querySelectorAll('#fDep .opt').forEach(o=>o.classList.toggle('on',o.dataset.d==="9"));document.querySelectorAll('#fFlags .opt').forEach(o=>o.classList.remove('on'));document.querySelectorAll('#seg button').forEach(b=>b.classList.toggle('on',b.dataset.u==="all"));fp.value=100;document.getElementById('fPriceV').textContent="上限なし";fa.value=0;document.getElementById('fAreaV').textContent="指定なし";updateApplyCnt();render();}
render();updateApplyCnt();
</script>
</body>
</html>
